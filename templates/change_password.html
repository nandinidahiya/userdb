{% extends "base.html" %}
{% block title %}Change Password — UserDB{% endblock %}
{% block content %}

<div style="max-width:440px;margin:0 auto;">
  <h1>Set <em>Password</em></h1>
  <p class="subtitle">First login — security requirement</p>

  <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;
              padding:16px 20px;margin-bottom:24px;display:flex;gap:12px;align-items:flex-start;">
    <span style="font-size:20px;">🔐</span>
    <p style="font-size:14px;color:#1d4ed8;line-height:1.5;">
      For your security, you must set a personal password before accessing the system.
    </p>
  </div>

  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Current Password <span style="color:var(--muted);font-weight:400;">(from your email)</span></label>
        <input type="password" name="current_password" autofocus required/>
      </div>
      <div class="form-group">
        <label>New Password <span style="color:var(--muted);font-weight:400;">(min 8 characters)</span></label>
        <input type="password" name="new_password" required minlength="8"/>
      </div>
      <div class="form-group" style="margin-bottom:24px;">
        <label>Confirm New Password</label>
        <input type="password" name="confirm_password" required minlength="8"/>
      </div>
      <button class="btn btn-primary btn-full" type="submit">Set Password &amp; Continue →</button>
    </form>
  </div>
</div>
{% endblock %}
