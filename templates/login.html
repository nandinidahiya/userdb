{% extends "base.html" %}
{% block title %}Login — UserDB{% endblock %}
{% block content %}

<div style="max-width:420px;margin:0 auto;">
  <h1>Welcome <em>Back</em></h1>
  <p class="subtitle">Sign in to your account</p>

  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" autocomplete="username" autofocus required placeholder="e.g. john.doe"/>
      </div>
      <div class="form-group" style="margin-bottom:24px;">
        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password" required placeholder="••••••••"/>
      </div>
      <button class="btn btn-primary btn-full" type="submit">Sign In →</button>
    </form>
  </div>

  <hr class="divider"/>
  <div style="display:flex;justify-content:space-between;">
    <a class="link-small" href="{{ url_for('register') }}">→ Create new account</a>
    <a class="link-small" href="{{ url_for('import_excel') }}">→ Bulk import via Excel</a>
  </div>
</div>
{% endblock %}
