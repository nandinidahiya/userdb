{% extends "base.html" %}
{% block title %}Verify OTP — UserDB{% endblock %}
{% block content %}

<div style="max-width:420px;margin:0 auto;">
  <h1>Verify <em>Email</em></h1>
  <p class="subtitle">Step 2 of 2 — Enter your OTP</p>

  <div class="otp-display">
    <p style="font-size:12px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;">OTP sent to</p>
    <p class="otp-email">{{ email }}</p>
    <p style="font-size:12px;color:var(--muted);margin-top:10px;">Check inbox and spam · Expires in 10 minutes</p>
  </div>

  <div class="card">
    <form method="POST">
      <div class="form-group" style="margin-bottom:24px;">
        <label>6-Digit OTP Code</label>
        <input class="otp-input" type="text" name="otp" maxlength="6"
               pattern="\d{6}" inputmode="numeric" autofocus required
               placeholder="_ _ _ _ _ _"/>
      </div>
      <button class="btn btn-primary btn-full" type="submit">Verify &amp; Create Account →</button>
    </form>
  </div>

  <hr class="divider"/>
  <div style="display:flex;justify-content:space-between;">
    <form method="POST" action="{{ url_for('resend_otp') }}" style="display:inline;">
      <button style="background:none;border:none;cursor:pointer;" class="link-small" type="submit">→ Resend OTP</button>
    </form>
    <a class="link-small" href="{{ url_for('register') }}">→ Start over</a>
  </div>
</div>
{% endblock %}
