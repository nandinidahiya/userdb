{% extends "base.html" %}
{% block title %}Register — UserDB{% endblock %}
{% block content %}
<h1>Create <em>Account</em></h1>
<p class="subtitle">Enter your details to get started</p>

<div class="card">
  <form method="POST">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" name="name" autofocus required/>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" name="email" required/>
    </div>
    <div class="form-group">
      <label>Phone <span style="color:var(--muted);">(optional)</span></label>
      <input type="tel" name="phone"/>
    </div>
    <div class="form-group">
      <label>Department <span style="color:var(--muted);">(optional)</span></label>
      <input type="text" name="department"/>
    </div>
    <button class="btn btn-primary btn-full" type="submit">Send Verification OTP</button>
  </form>
</div>

<hr class="divider"/>
<a class="link-small" href="{{ url_for('login') }}">→ Already have an account? Sign in</a>
{% endblock %}
