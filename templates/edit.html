{% extends "base.html" %}
{% block title %}Edit Record — UserDB{% endblock %}
{% block content %}

<div style="max-width:520px;margin:0 auto;">
  <h1>Edit <em>Record</em></h1>
  <p class="subtitle">Update your personal information</p>

  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" value="{{ user['name'] }}" required/>
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" name="phone" value="{{ user['phone'] or '' }}" placeholder="+91-9876543210"/>
      </div>
      <div class="form-group" style="margin-bottom:28px;">
        <label>Department</label>
        <input type="text" name="department" value="{{ user['department'] or '' }}" placeholder="Engineering"/>
      </div>
      <div style="display:flex;gap:12px;">
        <button class="btn btn-primary" type="submit">Save Changes</button>
        <a class="btn btn-outline" href="{{ url_for('dashboard') }}">Cancel</a>
      </div>
    </form>
  </div>

  <div style="background:#f9fafb;border:1px solid var(--border);border-radius:8px;
              padding:14px 18px;font-size:13px;color:var(--muted);">
    ℹ️ Email and username cannot be changed. Contact your administrator for these updates.
  </div>
</div>
{% endblock %}
