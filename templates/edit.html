{% extends "base.html" %}
{% block title %}Edit Record — UserDB{% endblock %}
{% block content %}
<h1>Edit <em>Record</em></h1>
<p class="subtitle">Update your personal information</p>

<div class="card">
  <form method="POST">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" name="name" value="{{ user['name'] }}" required/>
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input type="tel" name="phone" value="{{ user['phone'] or '' }}"/>
    </div>
    <div class="form-group">
      <label>Department</label>
      <input type="text" name="department" value="{{ user['department'] or '' }}"/>
    </div>
    <div style="display:flex;gap:12px;margin-top:8px;">
      <button class="btn btn-primary" type="submit">Save Changes</button>
      <a class="btn btn-outline" href="{{ url_for('dashboard') }}">Cancel</a>
    </div>
  </form>
</div>

<div class="card" style="opacity:0.6;">
  <p style="font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1px;color:var(--muted);">
    EMAIL &amp; USERNAME cannot be changed. Contact your administrator to update these fields.
  </p>
</div>
{% endblock %}
